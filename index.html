<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥺 please say yes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f5 0%, #fce4ec 50%, #f8bbd0 100%);
      font-family: "Georgia", serif;
      overflow: hidden;
    }

    /* pink vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(194,24,91,0.18) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* ── Background ambient hearts ── */
    .bg-heart {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: bgFloat linear infinite;
      font-size: 1.2rem;
    }
    @keyframes bgFloat {
      0%   { opacity: 0; transform: translateY(0) scale(0.8); }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.18; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.1); }
    }

    /* ── Main question ── */
    #main-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      position: relative;
      z-index: 1;
    }

    #peek-bear {
      position: fixed;
      left: -90px;
      bottom: 15%;
      font-size: 4rem;
      transition: left 0.6s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 2;
      filter: drop-shadow(2px 4px 8px rgba(194,24,91,0.2));
    }
    #peek-bear.peeking { left: -18px; }

    #question {
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: #c2185b;
      text-align: center;
      text-shadow: 0 2px 12px rgba(194,24,91,0.15);
      line-height: 1.3;
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.06); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.04); }
      70%      { transform: scale(1); }
    }

    #buttons {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 60px;
    }

    .btn {
      padding: 0.85rem 2.4rem;
      border: none;
      border-radius: 50px;
      font-size: 1.25rem;
      cursor: pointer;
      font-family: "Georgia", serif;
      font-weight: bold;
      transition: transform 0.12s, box-shadow 0.12s, font-size 0.4s ease;
    }

    #yes-btn {
      background: #e91e8c;
      color: white;
      box-shadow: 0 4px 18px rgba(233,30,140,0.35);
      position: relative;
      z-index: 1;
    }
    #yes-btn:hover  { transform: scale(1.08); box-shadow: 0 6px 24px rgba(233,30,140,0.45); }
    #yes-btn:active { transform: scale(0.97); }

    #no-btn {
      background: #f8bbd0;
      color: #880e4f;
      box-shadow: 0 4px 14px rgba(136,14,79,0.18);
      position: relative;
      z-index: 1;
      transition: transform 0.12s, font-size 0.4s ease, padding 0.4s ease;
    }

    /* sparkle cursor trail */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 1rem;
      animation: sparkleFade 0.7s ease-out forwards;
    }
    @keyframes sparkleFade {
      0%   { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.3) translateY(-20px); }
    }

    #no-message {
      font-size: 1rem;
      color: #ad1457;
      min-height: 1.4rem;
      text-align: center;
      transition: opacity 0.3s ease;
      font-style: italic;
    }

    /* ── Jump scare ── */
    #jumpscare {
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0000;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.06s ease;
    }
    #jumpscare.active  { opacity: 1; }
    #jumpscare.fade-out { opacity: 0; transition: opacity 0.4s ease; }

    #scare-emoji {
      font-size: clamp(5rem, 22vw, 13rem);
      animation: scarePop 0.12s ease-out forwards;
      filter: drop-shadow(0 0 40px rgba(255,0,0,0.8));
    }
    @keyframes scarePop {
      0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
      60%  { transform: scale(1.15) rotate(4deg);  opacity: 1; }
      80%  { transform: scale(0.95) rotate(-2deg); }
      100% { transform: scale(1)    rotate(0deg);  }
    }
    #scare-text {
      position: absolute;
      bottom: 18%;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: #ff2222;
      font-weight: bold;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: textFlicker 0.15s ease-in-out infinite alternate;
    }
    @keyframes textFlicker {
      from { opacity: 1; text-shadow: 0 0 12px #ff0000, 0 0 30px #ff0000; }
      to   { opacity: 0.7; text-shadow: 0 0 4px #ff0000; }
    }

    /* ── Success screen ── */
    #success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    #bear {
      font-size: clamp(4rem, 16vw, 8rem);
      display: block;
      filter: drop-shadow(0 8px 16px rgba(194,24,91,0.25));
    }
    /* bear story animations */
    @keyframes bearRun {
      0%   { transform: translateX(-120vw) scaleX(1); }
      48%  { transform: translateX(0)       scaleX(1); }
      52%  { transform: translateX(0)       scaleX(1); }
      100% { transform: translateX(0)       scaleX(1); }
    }
    @keyframes bearSpin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(360deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes bearSit {
      0%,100% { transform: translateY(0) rotate(-5deg) scale(1); }
      50%     { transform: translateY(-14px) rotate(5deg) scale(1.05); }
    }
    #bear.run  { animation: bearRun  0.9s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    #bear.spin { animation: bearSpin 0.6s ease-in-out forwards; }
    #bear.sit  { animation: bearSit  0.7s ease-in-out infinite alternate; }

    /* confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 150;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    .heart-float {
      position: fixed;
      font-size: 1.5rem;
      animation: floatUp 3s ease-out forwards;
      pointer-events: none;
      z-index: 50;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80vh) scale(1.4); }
    }

    #success-msg {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      color: #c2185b;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.6s ease 1.6s;
    }
    #success-msg.show { opacity: 1; }

    #sub-msg {
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      color: #ad1457;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.6s ease 2.2s;
    }
    #sub-msg.show { opacity: 1; }

    #hearts-row {
      font-size: 2rem;
      letter-spacing: 0.5rem;
      animation: pulse 1.1s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.6s ease 1.9s;
    }
    #hearts-row.show { opacity: 1; }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.92); }
    }

    #visit-count {
      font-size: 0.85rem;
      color: #c2185b;
      opacity: 0.6;
      font-style: italic;
      margin-top: 0.4rem;
    }

    #music-note {
      font-size: 0.9rem;
      color: #c2185b;
      opacity: 0.75;
      margin-top: 0.3rem;
    }
  </style>
</head>

    const h = document.createElement("div");
    h.className = "bg-heart";
    h.textContent = bgEmojis[Math.floor(Math.random() * bgEmojis.length)];
    h.style.left = (Math.random() * 100) + "vw";
    h.style.bottom = "-2rem";
    const dur = 7 + Math.random() * 8;
    h.style.animationDuration = dur + "s";
    h.style.animationDelay = "0s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), dur * 1000 + 500);
  }
  for (let i = 0; i < 6; i++) setTimeout(spawnBgHeart, i * 900);
  setInterval(spawnBgHeart, 1400);

  // ── Peek bear ──
  const peekBear = document.getElementById("peek-bear");
  setTimeout(() => peekBear.classList.add("peeking"), 800);
  // peek in and out
  setInterval(() => {
    peekBear.classList.toggle("peeking");
  }, 3500);

  // ── Yes button grows, No button shrinks over time ──
  const yesBtn = document.getElementById("yes-btn");
  const noBtn  = document.getElementById("no-btn");
  let yesFontSize = 1.25;
  setInterval(() => {
    yesFontSize = Math.min(yesFontSize + 0.06, 2.2);
    yesBtn.style.fontSize = yesFontSize + "rem";
  }, 1200);

  // ── Sparkle cursor trail on Yes hover ──
  const sparkleEmojis = ["✨","💖","🌸","💫","⭐"];
  yesBtn.addEventListener("mousemove", (e) => {
    if (Math.random() > 0.4) return;
    const s = document.createElement("div");
    s.className = "sparkle";
    s.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
    s.style.left = (e.clientX + (Math.random()*20-10)) + "px";
    s.style.top  = (e.clientY + (Math.random()*20-10)) + "px";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  });

  // ── Audio ──
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playScream() {
    try {
      const ctx = getAudioCtx();
      const dur = 1.1;
      const bufSize = ctx.sampleRate * dur;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buf;
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(800, ctx.currentTime);
      bp.frequency.exponentialRampToValueAtTime(3200, ctx.currentTime + 0.3);
      bp.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + dur);
      bp.Q.value = 1.8;
      const gainNode = ctx.createGain();
      gainNode.gain.setValueAtTime(0, ctx.currentTime);
      gainNode.gain.linearRampToValueAtTime(1.4, ctx.currentTime + 0.05);
      gainNode.gain.linearRampToValueAtTime(0.9, ctx.currentTime + 0.4);
      gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
      const osc = ctx.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.15);
      osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + dur);
      const oscGain = ctx.createGain();
      oscGain.gain.setValueAtTime(0.5, ctx.currentTime);
      oscGain.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);
      noise.connect(bp); bp.connect(gainNode); gainNode.connect(ctx.destination);
      osc.connect(oscGain); oscGain.connect(ctx.destination);
      noise.start(ctx.currentTime); noise.stop(ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  // ── No button ──
  let noClicks = 0;
  const noMessages = [
    "are you sure? 🥺",
    "please reconsider 😭",
    "the bear is crying 😢",
    "FINE. but the bear is upset 🐻💔"
  ];
  const noMsgEl = document.getElementById("no-message");

  noBtn.addEventListener("click", () => {
    noClicks++;
    if (noClicks === 1) {
      playScream();
      triggerJumpScare();
      const rect = noBtn.getBoundingClientRect();
      noBtn.style.position = "fixed";
      noBtn.style.left = rect.left + "px";
      noBtn.style.top  = rect.top  + "px";
      noBtn.style.margin = "0";
      setTimeout(teleportButton, 50);
    }
    const msgIdx = Math.min(noClicks - 1, noMessages.length - 1);
    noMsgEl.style.opacity = "0";
    setTimeout(() => {
      noMsgEl.textContent = noMessages[msgIdx];
      noMsgEl.style.opacity = "1";
    }, 200);
  });

  noBtn.addEventListener("mouseenter", () => {
    if (noClicks >= 1) teleportButton();
  });
  noBtn.addEventListener("touchstart", (e) => {
    if (noClicks >= 1) { e.preventDefault(); teleportButton(); }
  }, { passive: false });

  function teleportButton() {
    const bw = noBtn.offsetWidth + 20;
    const bh = noBtn.offsetHeight + 20;
    const maxX = window.innerWidth  - bw;
    const maxY = window.innerHeight - bh;
    noBtn.style.transition = "left 0.15s ease, top 0.15s ease";
    noBtn.style.left = Math.max(10, Math.random() * maxX) + "px";
    noBtn.style.top  = Math.max(10, Math.random() * maxY) + "px";
    showSkeptic();
  }

  // ── Skeptic emoji pops from a random edge ──
  const skepticEmojis = ["🤨","🙄","😒","😑","🫤","😤"];
  function showSkeptic() {
    const s = document.createElement("div");
    s.style.cssText = "position:fixed;font-size:2.8rem;z-index:300;pointer-events:none;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;";
    s.textContent = skepticEmojis[Math.floor(Math.random() * skepticEmojis.length)];

    // Pick a random edge (0=top,1=right,2=bottom,3=left)
    const edge = Math.floor(Math.random() * 4);
    const pos  = 15 + Math.random() * 70; // % along that edge

    let startTransform, endTransform;
    if (edge === 0) {
      s.style.left = pos + "vw"; s.style.top = "-3.5rem";
      startTransform = "translateY(0)"; endTransform = "translateY(3.5rem)";
    } else if (edge === 1) {
      s.style.right = "-3.5rem"; s.style.top = pos + "vh";
      startTransform = "translateX(0)"; endTransform = "translateX(-3.5rem)";
    } else if (edge === 2) {
      s.style.left = pos + "vw"; s.style.bottom = "-3.5rem";
      startTransform = "translateY(0)"; endTransform = "translateY(-3.5rem)";
    } else {
      s.style.left = "-3.5rem"; s.style.top = pos + "vh";
      startTransform = "translateX(0)"; endTransform = "translateX(3.5rem)";
    }

    s.style.transform = startTransform;
    s.style.opacity = "0";
    document.body.appendChild(s);

    // Slide in
    requestAnimationFrame(() => requestAnimationFrame(() => {
      s.style.transform = endTransform;
      s.style.opacity = "1";
    }));

    // Slide back out after 900ms
    setTimeout(() => {
      s.style.transform = startTransform;
      s.style.opacity = "0";
      setTimeout(() => s.remove(), 300);
    }, 900);
  }

  function triggerJumpScare() {
    const js = document.getElementById("jumpscare");
    const emoji = document.getElementById("scare-emoji");
    js.style.display = "flex";
    js.offsetHeight;
    js.classList.add("active");
    const scareEmojis = ["👻","😱","💀","🕷️","🫨"];
    let eIdx = 0;
    const emojiCycle = setInterval(() => {
      eIdx = (eIdx + 1) % scareEmojis.length;
      emoji.textContent = scareEmojis[eIdx];
      emoji.style.animation = "none";
      emoji.offsetHeight;
      emoji.style.animation = "";
    }, 260);
    setTimeout(() => {
      clearInterval(emojiCycle);
      js.classList.remove("active");
      js.classList.add("fade-out");
      setTimeout(() => {
        js.style.display = "none";
        js.classList.remove("fade-out");
        emoji.textContent = "👻";
      }, 400);
    }, 1500);
  }

  // ── Yes ──
  function onYes() {
    peekBear.style.display = "none";
    document.getElementById("main-view").style.display = "none";
    noBtn.style.display = "none";
    document.getElementById("success").style.display = "flex";

    // visit counter via localStorage
    const count = parseInt(localStorage.getItem("loveYesCount") || "0") + 1;
    localStorage.setItem("loveYesCount", count);
    const vc = document.getElementById("visit-count");
    if (count > 1) vc.textContent = "she\'s said yes " + count + " times now 🥹";

    // Bear story: run in → spin → sit
    const bear = document.getElementById("bear");
    bear.classList.add("run");
    setTimeout(() => {
      bear.classList.remove("run");
      bear.classList.add("spin");
      setTimeout(() => {
        bear.classList.remove("spin");
        bear.classList.add("sit");
      }, 600);
    }, 900);

    // Fade in text
    setTimeout(() => document.getElementById("success-msg").classList.add("show"), 100);
    setTimeout(() => document.getElementById("hearts-row").classList.add("show"), 100);
    setTimeout(() => document.getElementById("sub-msg").classList.add("show"), 100);

    // Confetti cannon
    confettiBurst();

    // Music
    const mineAudio = document.getElementById("mine-audio");
    mineAudio.currentTime = 40;
    mineAudio.volume = 0.85;
    mineAudio.play().catch(e => {});

    spawnHearts();
    setInterval(spawnHearts, 3000);
  }

  function confettiBurst() {
    const colors = ["#e91e8c","#f48fb1","#ff80ab","#fff","#ffd6e7","#c2185b","#ffcdd2"];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement("div");
        c.className = "confetti-piece";
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.left = (20 + Math.random() * 60) + "vw";
        c.style.top  = "-10px";
        c.style.width  = (6 + Math.random() * 8) + "px";
        c.style.height = (6 + Math.random() * 8) + "px";
        c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        const dur = 1.5 + Math.random() * 2;
        c.style.animationDuration = dur + "s";
        c.style.animationDelay = (Math.random() * 0.6) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), (dur + 1) * 1000);
      }, i * 18);
    }
  }

  function spawnHearts() {
    const emojis = ["❤️","💕","💖","💗","🧸","💓","✨","🌸"];
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const h = document.createElement("div");
        h.className = "heart-float";
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = (5 + Math.random() * 90) + "vw";
        h.style.bottom = "-2rem";
        h.style.animationDuration = (2.5 + Math.random() * 1.5) + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
      }, i * 200);
    }
  }
</script>
</body>
